<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tree Bid Calculator</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f3f3f3;
  color: #222;
}

h2, h3, h4 { margin: 0 0 10px; }

.card {
  background: #fff;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
}

.tree-summary {
  cursor: pointer;
  border: 2px solid #ddd;
}

.tree-summary.active { border-color: #222; }

label {
  display: block;
  font-weight: bold;
  margin-top: 10px;
}

select,
input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
}

.checkbox-text { flex: 1; }

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  background: #222;
  color: white;
  border: none;
}

.print-btn {
  background: #14532d;
}

.total-box {
  background: #222;
  color: white;
  padding: 16px;
  border-radius: 12px;
  margin-bottom: 15px;
  text-align: center;
  font-size: 26px;
  font-weight: bold;
}

#printArea { display: none; }

/* PRINT FIX */
@media print {
  @page { margin: 0.5in; }

  body > *:not(#printArea) {
    display: none !important;
  }

  #printArea {
    display: block !important;
    position: static !important;
    width: auto;
    padding: 0;
    margin: 0;
  }

  .print-tree {
    padding: 8px 0;
    border-bottom: 1px solid #ccc;
    page-break-inside: avoid;
  }

  .print-section {
    margin-top: 16px;
    page-break-inside: avoid;
  }
}
</style>
</head>

<body>

<h2>Tree Bid Calculator</h2>

<div class="total-box" id="finalTotal">$0</div>

<div id="trees"></div>

<button onclick="addTree()">+ Add Tree</button>

<div class="card">
<h3>Fixed Add-Ons</h3>

<label class="checkbox-row">
<input type="checkbox" id="climber" onchange="calculate()">
<span class="checkbox-text">Two Climbers (+$600)</span>
</label>

<label class="checkbox-row">
<input type="checkbox" id="craneCheck" onchange="calculate()">
<span class="checkbox-text">Crane</span>
</label>
<input type="number" id="crane" value="1500" oninput="calculate()">

<label class="checkbox-row">
<input type="checkbox" id="excavatorCheck" onchange="calculate()">
<span class="checkbox-text">Mini Excavator</span>
</label>
<input type="number" id="excavator" value="700" oninput="calculate()">

<input type="number" id="manual" value="0" oninput="calculate()" placeholder="Manual Add ($)">
</div>

<div class="card">
<h3>Minimum Price</h3>

<label class="checkbox-row">
<input type="checkbox" id="minimumCheck" checked onchange="calculate()">
<span>Apply Minimum</span>
</label>

<input type="number" id="minimumPrice" value="600" oninput="calculate()">
</div>

<div class="card">
<h3>Discounts</h3>

<select id="nohaul" onchange="calculate()">
<option value="0">No Haul-Off 0%</option>
<option value="10">10%</option>
<option value="12">12%</option>
<option value="15">15%</option>
</select>

<select id="cash" onchange="calculate()">
<option value="0">Cash 0%</option>
<option value="3">3%</option>
<option value="5">5%</option>
</select>

<select id="returning" onchange="calculate()">
<option value="0">$0 Returning</option>
<option value="100">$100</option>
</select>

<select id="multiTreeDiscount" onchange="calculate()">
<option value="0">Multi Tree 0%</option>
<option value="5">5%</option>
<option value="10">10%</option>
</select>

</div>

<button class="print-btn" onclick="printEstimate()">Print Estimate</button>

<div id="printArea"></div>

<script>
let trees=[];
let activeTree=0;

const sizes={
450:"Small",
800:"Medium",
1400:"Large",
1950:"XL"
};

const canopy={1:"Light",1.2:"Large"};

const diff=[
{key:"normalRig",label:"Normal Rigging",val:.15},
{key:"techRig",label:"Technical Rigging",val:.25},
{key:"struct",label:"Structure",val:.15},
{key:"highStruct",label:"High Risk Structure",val:.25}
];

function addTree(){
trees.push({size:1950,can:1,d:[]});
activeTree=trees.length-1;
render();
}

function render(){
let html="";
trees.forEach((t,i)=>{
calcTree(t);
html+=`<div class="card tree-summary ${i===activeTree?"active":""}" onclick="activeTree=${i};render()">
Tree ${i+1} - $${Math.round(t.total)}
</div>`;

if(i===activeTree){
html+=`<div class="card">
<select onchange="t.size=this.value;render()">
<option value="450">Small</option>
<option value="800">Medium</option>
<option value="1400">Large</option>
<option value="1950" selected>XL</option>
</select>

${diff.map(d=>`
<label class="checkbox-row">
<input type="checkbox" ${t.d.includes(d.key)?"checked":""}
onchange="toggle(${i},'${d.key}',this.checked)">
${d.label}
</label>`).join("")}
</div>`;
}
});

trees.innerHTML=html;
calculate();
}

function toggle(i,k,c){
if(c){
if(k==="normalRig") trees[i].d=trees[i].d.filter(x=>x!=="techRig");
if(k==="techRig") trees[i].d=trees[i].d.filter(x=>x!=="normalRig");
if(k==="struct") trees[i].d=trees[i].d.filter(x=>x!=="highStruct");
if(k==="highStruct") trees[i].d=trees[i].d.filter(x=>x!=="struct");

trees[i].d.push(k);
}else{
trees[i].d=trees[i].d.filter(x=>x!==k);
}
render();
}

function calcTree(t){
let base=t.size;
let pct=t.d.reduce((a,k)=>a+diff.find(d=>d.key===k).val,0);
t.total=base*(1+pct);
}

function calculate(){
let total=trees.reduce((s,t)=>s+t.total,0);

if(climber.checked) total+=600;
if(craneCheck.checked) total+=+crane.value;
if(excavatorCheck.checked) total+=+excavator.value;

total+=+manual.value;

total*=1-nohaul.value/100;
total*=1-cash.value/100;
total*=1-multiTreeDiscount.value/100;
total-=+returning.value;

if(minimumCheck.checked && total<minimumPrice.value) total=minimumPrice.value;

finalTotal.innerHTML="$"+Math.round(total);
return total;
}

function printEstimate(){
let total=calculate();

let html=`<h1>Estimate</h1>`;

trees.forEach((t,i)=>{
html+=`<div class="print-tree">Tree ${i+1}: $${Math.round(t.total)}</div>`;
});

html+=`<div class="print-section"><strong>Total: $${Math.round(total)}</strong></div>`;

printArea.innerHTML=html;

window.print();
}

addTree();
</script>

</body>
</html>
