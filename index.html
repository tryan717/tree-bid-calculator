<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tree Bid Calculator</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f3f3f3;
  color: #222;
}

h2, h3, h4 { margin: 0 0 10px; }

.card {
  background: #fff;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.12);
}

.tree-summary {
  cursor: pointer;
  border: 2px solid #ddd;
}

.tree-summary.active { border-color: #222; }

label {
  display: block;
  font-weight: bold;
  margin-top: 10px;
}

select,
input[type="number"] {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: 1px solid #bbb;
  border-radius: 8px;
  font-size: 16px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid #eee;
  font-weight: normal;
  margin-top: 0;
}

.checkbox-row input {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
}

.checkbox-text {
  flex: 1;
  font-size: 15px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border: none;
  border-radius: 10px;
  background: #222;
  color: white;
  font-size: 16px;
  font-weight: bold;
}

.remove-btn { background: #8b1e1e; }
.print-btn { background: #14532d; }
.def-btn { background: #444; }

.total-box {
  background: #222;
  color: white;
  padding: 16px;
  border-radius: 12px;
  margin: 12px 0 20px;
  text-align: center;
}

.total {
  font-size: 28px;
  font-weight: bold;
}

#printArea { display: none; }

@media print {
  @page { margin: 0.5in; }

  body > *:not(#printArea) {
    display: none !important;
  }

  #printArea {
    display: block !important;
    position: static !important;
  }
}
</style>
</head>

<body>

<h2>Tree Bid Calculator</h2>

<div class="total-box">
  <div class="total" id="finalTotal">$0</div>
</div>

<div id="trees"></div>

<button onclick="addTree()">+ Add Tree</button>

<!-- UPDATED BUTTON -->
<button class="def-btn" onclick="window.open('/definitions.html', '_blank')">
  View Difficulty Definitions
</button>

<div class="card">
<h3>Fixed Add-Ons</h3>

<label class="checkbox-row">
<input type="checkbox" id="climber" onchange="calculate()">
<span class="checkbox-text">Two Climbers (+$600)</span>
</label>

<label class="checkbox-row">
<input type="checkbox" id="excavatorCheck" onchange="calculate()">
<span class="checkbox-text">Mini Excavator</span>
</label>
<input type="number" id="excavator" value="500" oninput="calculate()">

</div>

<div class="card">
<h3>Discounts</h3>

<select id="nohaul" onchange="calculate()">
<option value="0">No Haul-Off 0%</option>
<option value="10">10%</option>
<option value="15">15%</option>
</select>

</div>

<button class="print-btn" onclick="window.print()">Print</button>

<script>
let trees = [];

function addTree(){
trees.push({base:2050,can:1.35});
render();
}

function render(){
let html="";
trees.forEach((t,i)=>{
html+=`<div class="card">Tree ${i+1} Total: $${calc(t)}</div>`;
});
treesDiv.innerHTML=html;
calculate();
}

function calc(t){
return Math.round(t.base*t.can+500);
}

function calculate(){
let total=trees.reduce((s,t)=>s+calc(t),0);
if(excavatorCheck.checked) total+=+excavator.value;
total*=1-nohaul.value/100;
finalTotal.innerHTML="$"+Math.round(total);
}

addTree();
</script>

</body>
</html>
