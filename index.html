<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tree Bid Calculator</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  padding: 12px;
  background: #f3f3f3;
  color: #222;
}

h2, h3, h4 { margin: 0 0 10px; }

.card {
  background: #fff;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 12px;
  box-shadow: 0 1px 4px rgba(0,0,0,.12);
}

.tree-summary {
  cursor: pointer;
  border: 2px solid #ddd;
}

.tree-summary.active { border-color: #222; }

label {
  display: block;
  font-weight: bold;
  margin-top: 10px;
}

select,
input[type="number"],
input[type="text"],
input[type="date"] {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: 1px solid #bbb;
  border-radius: 8px;
  font-size: 16px;
}

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 0;
  border-bottom: 1px solid #eee;
}

.checkbox-row input {
  width: 22px;
  height: 22px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border: none;
  border-radius: 10px;
  background: #222;
  color: white;
  font-size: 16px;
  font-weight: bold;
}

.total-box {
  background: #222;
  color: white;
  padding: 16px;
  border-radius: 12px;
  margin: 12px 0 20px;
  text-align: center;
}

.total {
  font-size: 28px;
  font-weight: bold;
}

#definitionsPage { display: none; }
#printArea { display: none; }

.definition-card {
  background: white;
  padding: 14px;
  margin-bottom: 10px;
  border-radius: 12px;
}

@media print {
  body > *:not(#printArea) { display:none !important; }
  #printArea { display:block !important; }
}
</style>
</head>

<body>

<div id="calculatorPage">

<h2>Tree Bid Calculator</h2>

<div class="card">
<h3>Job Info</h3>
<input id="customerName" placeholder="Customer Name">
<input id="jobAddress" placeholder="Job Address">
<input id="jobDate" type="date">
</div>

<div class="total-box">
<div class="total" id="finalTotal">$0</div>
</div>

<div id="trees"></div>

<button onclick="addTree()">+ Add Tree</button>
<button onclick="showDefinitions()">View Definitions</button>

<div class="card">
<h3>Fixed Add-Ons</h3>

<label class="checkbox-row">
<input type="checkbox" id="climber" onchange="calculate()">
Two Climbers (+$600)
</label>

<label class="checkbox-row">
<input type="checkbox" id="craneCheck" onchange="calculate()">
Crane
</label>
<input type="number" id="crane" value="1500" oninput="calculate()">

<label class="checkbox-row">
<input type="checkbox" id="excavatorCheck" onchange="calculate()">
Mini Excavator
</label>
<input type="number" id="excavator" value="500" oninput="calculate()">

<input type="number" id="manual" value="0" oninput="calculate()" placeholder="Manual Add-On">
</div>

<div class="card">
<h3>Discounts</h3>

<label class="checkbox-row">
<input type="checkbox" id="nohaulCheck" onchange="calculate()">
No Log Haul-Off (–22%)
</label>

<select id="cash" onchange="calculate()">
<option value="0">$0 Cash Discount</option>
<option value="50">$50</option>
<option value="100">$100</option>
<option value="150">$150</option>
<option value="200">$200</option>
</select>

<select id="returning" onchange="calculate()">
<option value="0">$0 Returning</option>
<option value="50">$50</option>
<option value="100">$100</option>
<option value="150">$150</option>
<option value="200">$200</option>
</select>

</div>

<button onclick="printEstimate()">Print Estimate</button>

</div>

<div id="definitionsPage">
<h2>Definitions</h2>
<button onclick="showCalculator()">← Back</button>

<div class="definition-card">Normal Rigging</div>
<div class="definition-card">Technical Rigging</div>
<div class="definition-card">Near Structure</div>
<div class="definition-card">High Risk Structure</div>
<div class="definition-card">Dead / Brittle</div>
<div class="definition-card">Poor Drop Zone</div>
<div class="definition-card">Bad Access</div>
<div class="definition-card">Steep Terrain</div>
<div class="definition-card">Heavy Cleanup</div>
<div class="definition-card">XL Logs</div>

</div>

<div id="printArea"></div>

<script>
let trees=[];

function addTree(){
trees.push({base:2050});
render();
}

function render(){
let html="";
trees.forEach((t,i)=>{
html+=`<div class="card">Tree ${i+1}: $${calcTree(t)}</div>`;
});
treesDiv.innerHTML=html;
calculate();
}

function calcTree(t){
return t.base;
}

function calculate(){

let treeTotal=trees.reduce((s,t)=>s+calcTree(t),0);

if(nohaulCheck.checked){
treeTotal*=0.78;
}

let addOns=0;

if(climber.checked) addOns+=600;
if(craneCheck.checked) addOns+=+crane.value;
if(excavatorCheck.checked) addOns+=+excavator.value;

addOns+=+manual.value;

let total=treeTotal+addOns;

total-=+cash.value;
total-=+returning.value;

if(total<0) total=0;

finalTotal.innerHTML="$"+Math.round(total);
return total;
}

function showDefinitions(){
calculatorPage.style.display="none";
definitionsPage.style.display="block";
}

function showCalculator(){
definitionsPage.style.display="none";
calculatorPage.style.display="block";
}

function printEstimate(){
let total=calculate();

let html=`
<h1>Estimate</h1>
Customer: ${customerName.value}<br>
Address: ${jobAddress.value}<br>
Date: ${jobDate.value}<br>
Total: $${total}
`;

printArea.innerHTML=html;
window.print();
}

addTree();
</script>

</body>
</html>
